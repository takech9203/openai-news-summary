name: OpenAI News Summary

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to look back (default: 3)'
        required: false
        default: '3'
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'

permissions:
  id-token: write
  contents: write
  pages: write

env:
  PYTHON_VERSION: '3.12'

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Run OpenAI News Summary
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          DEBUG: ${{ github.event.inputs.debug || 'false' }}
          INFOGRAPHIC_BASE_URL: ${{ vars.INFOGRAPHIC_BASE_URL }}
        run: |
          python run.py --days ${{ github.event.inputs.days || '3' }}

      - name: Check for changes
        id: check_changes
        run: |
          changes=$(git status --porcelain reports/ infographic/ 2>/dev/null || true)
          if [[ -n "$changes" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/ 2>/dev/null || true
          git add infographic/ 2>/dev/null || true
          git commit -m "docs(reports): add reports for $(date +%Y-%m-%d)" || true
          git pull --rebase origin main || true
          git push || true

  deploy-pages:
    needs: generate-reports
    runs-on: ubuntu-latest
    if: always() && needs.generate-reports.result == 'success'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest changes
        run: git pull origin main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare public directory
        run: |
          mkdir -p public
          cp -r infographic/* public/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
